        .quiz-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
        .quiz-actions button { background: #666; color: white; border: none; padding: 8px 18px; border-radius: 25px; cursor: pointer; }

    <div class="voice-indicator" id="voiceIndicator">🎙️ IA en attente</div>
    <div class="game-container" id="gameContainer">

    <script>
        // ============================================
        // 25 QUESTIONS - DÉBUTANT NIVEAU 2
        // Diagnostic clinique, tests de vitalité, symptômes
        // ============================================
        const questions = [
            { question: "Quel test de vitalité pulpaire est considéré comme le plus fiable ?", options: ["Test thermique au froid", "Test thermique à la chaleur", "Test électrique (EPT)", "Test à la percussion"], correct: 0, explanation: "Le test au froid (Endo Ice) est considéré comme le plus fiable car il donne moins de faux positifs que l'EPT." },
            { question: "Un patient se présente avec une douleur spontanée nocturne. Quel est le diagnostic le plus probable ?", options: ["Pulpite réversible", "Pulpite irréversible", "Nécrose pulpaire", "Parodontite apicale"], correct: 1, explanation: "La douleur spontanée, surtout nocturne, est le signe caractéristique d'une pulpite irréversible." },
            { question: "Quel est le signe clinique le plus précoce d'une nécrose pulpaire ?", options: ["Douleur à la percussion", "Discoloration de la couronne", "Absence de réponse aux tests de vitalité", "Fistule"], correct: 2, explanation: "L'absence de réponse aux tests thermiques et électriques est le premier signe de nécrose pulpaire." },
            { question: "La douleur à la percussion d'une dent indique :", options: ["Une pathologie pulpaire", "Une inflammation périapicale", "Une carie profonde", "Une fracture coronaire"], correct: 1, explanation: "La douleur à la percussion signe une inflammation du desmodonte (parodontite apicale)." },
            { question: "Quelle est la principale limitation du test électrique (EPT) ?", options: ["Il est douloureux", "Il nécessite une digue", "Il ne fonctionne pas sur les dents avec des couronnes métalliques", "Il est trop cher"], correct: 2, explanation: "L'EPT ne fonctionne pas sur les dents métalliques ou avec des couronnes métalliques car le courant est conduit par le métal." },
            { question: "Un patient a une dent qui répond au froid avec une douleur durant 2 secondes. Que conclure ?", options: ["Pulpite irréversible", "Pulpite réversible", "Nécrose", "Pulpe normale"], correct: 1, explanation: "Une douleur brève (moins de 10 secondes) au froid évoque une pulpite réversible." },
            { question: "Un patient a une dent qui répond au froid avec une douleur durant 30 secondes. Que conclure ?", options: ["Pulpite réversible", "Pulpite irréversible", "Pulpe normale", "Hyperhémie"], correct: 1, explanation: "Une douleur prolongée (>10-15 secondes) au froid est caractéristique d'une pulpite irréversible." },
            { question: "Quel est le diagnostic différentiel principal entre une douleur d'origine pulpaire et une douleur d'origine parodontale ?", options: ["La douleur pulpaire est provoquée par le chaud/froid, la douleur parodontale par la percussion", "La douleur pulpaire est constante", "La douleur parodontale est spontanée", "Il n'y a pas de différence"], correct: 0, explanation: "La douleur pulpaire est généralement thermosensible, tandis que la douleur parodontale est aggravée par la percussion et la palpation." },
            { question: "Un patient a une dent avec une fistule sur la gencive. Le test de vitalité est négatif. Quel est le diagnostic ?", options: ["Pulpite réversible", "Pulpite irréversible", "Nécrose pulpaire avec abcès chronique", "Gingivite"], correct: 2, explanation: "L'association fistule + test de vitalité négatif est caractéristique d'une nécrose pulpaire avec abcès chronique." },
            { question: "Quel test est le plus utile pour différencier une parodontite apicale d'une parodontite marginale ?", options: ["Test thermique", "Sondage parodontal", "Radiographie rétro-alvéolaire", "Test de mobilité"], correct: 1, explanation: "Le sondage parodontal permet de localiser la perte d'attache : apicale (proche de l'apex) vs marginale (collet)." },
            { question: "Un patient a une douleur à la mastication sur une dent dévitalisée traitée. À quoi faut-il penser en premier ?", options: ["Fracture radiculaire verticale", "Échec du traitement canalaire", "Parodontite apicale", "Dent surnuméraire"], correct: 0, explanation: "Une fracture radiculaire verticale est une complication classique des dents dévitalisées, se manifestant par une douleur à la mastication." },
            { question: "Quel signe radiographique est évocateur d'une parodontite apicale chronique ?", options: ["Radiolucence périapicale", "Hypercémentose", "Sclérose osseuse", "Dilacération radiculaire"], correct: 0, explanation: "Une image radiotransparente (noire) autour de l'apex est le signe radiographique de la parodontite apicale chronique." },
            { question: "Que signifie une image radio-opaque (blanche) autour de l'apex d'une dent ?", options: ["Parodontite apicale", "Ostéite condensante", "Kyste", "Granulome"], correct: 1, explanation: "L'ostéite condensante est une réaction osseuse sclérotique (plus blanc sur la radio) à une infection de faible intensité." },
            { question: "Un patient a une douleur sourde et continue sur une dent non vitale. Pas de fistule. Quel est le diagnostic ?", options: ["Abcès apical aigu", "Abcès apical chronique", "Parodontite apicale chronique", "Granulome"], correct: 2, explanation: "La parodontite apicale chronique associe une dent non vitale, une image périapicale radio-claire, et parfois des douleurs sourdes." },
            { question: "Un patient a un gonflement facial associé à une dent cariée. La dent est très douloureuse à la percussion. Il a de la fièvre. Quel est le diagnostic ?", options: ["Abcès parodontal", "Pulpite réversible", "Abcès apical aigu avec cellulite", "Péricoronarite"], correct: 2, explanation: "Le tableau est celui d'un abcès apical aigu s'étendant aux tissus mous, avec signes généraux (fièvre)." },
            { question: "Que signifie une réponse positive au test de palpation ?", options: ["L'infection a traversé l'os cortical", "La pulpe est nécrosée", "La dent a une fracture", "Il y a une carie"], correct: 0, explanation: "La douleur à la palpation de la gencive au niveau de l'apex signifie que l'inflammation a perforé l'os cortical." },
            { question: "Un patient a une dent avec une couronne et se plaint de douleur uniquement au froid. La douleur passe en 5 secondes. Diagnostic ?", options: ["Pulpite réversible", "Pulpite irréversible", "Couronne mal adaptée", "Nécrose"], correct: 0, explanation: "Une douleur brève et provoquée par le froid sur une dent récente est souvent une pulpite réversible post-opératoire." },
            { question: "Quel est le test de choix pour diagnostiquer une fracture radiculaire verticale ?", options: ["Radiographie rétro-alvéolaire", "CBCT", "Test de vitalité", "Test thermique"], correct: 1, explanation: "Le Cone Beam CT (CBCT) est l'examen le plus sensible pour détecter les fractures radiculaires verticales." },
            { question: "Un patient a une dent qui répond à la fois au froid et à la chaleur avec une douleur prolongée. Diagnostic ?", options: ["Pulpite réversible", "Pulpite irréversible", "Pulpe normale", "Hyperhémie"], correct: 1, explanation: "Une douleur à la fois au chaud et au froid avec une persistance (>15s) est typique de la pulpite irréversible." },
            { question: "Qu'est-ce que le signe de la flèche (arrow sign) en endodontie ?", options: ["Une image radiographique de l'apex", "Une douleur à la percussion", "Un signe de fracture radiculaire", "Un signe de perforation"], correct: 0, explanation: "Le signe de la flèche correspond à un épaississement du desmodonte, souvent signe de parodontite apicale débutante." },
            { question: "Un patient a une dent avec une radiolucence périapicale mais la dent répond normalement aux tests de vitalité. Que faire ?", options: ["Traitement canalaire", "Extraction", "Biopsie", "Surveillance"], correct: 2, explanation: "Une lésion périapicale sur une dent vitale fait suspecter une lésion d'origine non endodontique (kyste, tumeur). Une biopsie est nécessaire." },
            { question: "Quelle est la principale cause d'échec d'un traitement canalaire ?", options: ["Erreur de longueur de travail", "Obturation insuffisante", "Infection persistante", "Fracture instrumentale"], correct: 2, explanation: "Une infection bactérienne persistante dans le système canalaire est la principale cause d'échec." },
            { question: "Un patient a une douleur à la percussion sur une dent avec un traitement canalaire. Le CBCT montre une lésion apicale. Diagnostic ?", options: ["Parodontite apicale symptomatique", "Fracture radiculaire", "Échec du traitement", "Réaction au ciment"], correct: 0, explanation: "La douleur à la percussion sur une dent avec lésion apicale définit une parodontite apicale symptomatique." },
            { question: "Que signifie une douleur provoquée par la chaleur qui est soulagée par le froid ?", options: ["Pulpite réversible", "Nécrose pulpaire", "Pulpe normale", "Pulpite irréversible"], correct: 3, explanation: "C'est un signe précoce de pulpite irréversible où l'accumulation de gaz sous l'effet de la chaleur provoque une douleur soulagée par le froid." },
            { question: "Quel est le test de vitalité le plus fiable chez un enfant (dent immature) ?", options: ["Test électrique", "Test au froid", "Test au chaud", "Test à la percussion"], correct: 1, explanation: "Le test au froid est plus fiable chez l'enfant car l'EPT peut donner des faux négatifs sur les dents immatures." }
        ];

        const LEVEL_ID = 'debutant2';
        const LEVEL_NAME = 'Débutant Niveau 2';
        const MAX_SCORE = questions.length * 10;
        
        // ============================================
        // VOICE SYSTEM
        // ============================================
        let speechSynthesisObj = null;
        let voiceActive = true;
        let voiceReady = false;
        
        function initVoice() {
            if ('speechSynthesis' in window) {
                speechSynthesisObj = window.speechSynthesis;
                voiceReady = true;
                return true;
            }
            return false;
        }
        
        function speak(text) {
            if (!voiceActive || !speechSynthesisObj || !voiceReady) return;
            try {
                speechSynthesisObj.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.9;
                utterance.pitch = 1.0;
                speechSynthesisObj.speak(utterance);
            } catch(e) {}
        }
        
        initVoice();
        
        // ============================================
        // VOICE MESSAGES
        // ============================================
        
        function demarrerQuizAvecVoix() {
            speak("Bienvenue Docteur dans ETEO, Endo To Every One. Niveau Débutant 2, diagnostic initial. C'est parti !");
            setTimeout(() => {
                startQuiz();
            }, 10000);
        }
        
        function afficherClassementAvecVoix() {
            speak("Voici le classement mondial ETEO. Découvrez les meilleurs scores.");
            setTimeout(() => {
                afficherClassement();
            }, 4000);
        }
        
        function demanderAvisAvecVoix() {
            const googleFormLink = "https://docs.google.com/forms/d/e/1FAIpQLSca6J-wmsp7Ci9-Y_LEyhyvj4BrazhHZpLhmB3YcDgckzya6Q/viewform";
            window.open(googleFormLink, '_blank');
            speak("Merci Docteur, votre avis nous est précieux. Cela nous aidera à améliorer ETEO.");
        }
        
        function retourMenuAvecVoix() {
            speak("Retour au menu principal.");
            setTimeout(() => {
                window.location.href = "menu_fr.html";
            }, 3000);
        }
        
        // ============================================
        // SHARE FUNCTION
        // ============================================
        function shareResult(score, maxScore, levelName, timeSeconds) {
            const percentage = Math.round((score / maxScore) * 100);
            const minutes = Math.floor(timeSeconds / 60);
            const seconds = timeSeconds % 60;
            
            let emoji = "";
            let messageText = "";
            if (percentage >= 90) { emoji = "🏆👑"; messageText = "Maîtrise parfaite !"; }
            else if (percentage >= 75) { emoji = "🦷⭐"; messageText = "Très bonne maîtrise !"; }
            else if (percentage >= 60) { emoji = "👍📚"; messageText = "Bon niveau !"; }
            else if (percentage >= 50) { emoji = "📖🤔"; messageText = "En progrès !"; }
            else { emoji = "💪😊"; messageText = "Je m'améliore !"; }
            
            const message = `🦷 ETEO - Endo To Every One\n\n` +
                            `📊 Mon score : ${score}/${maxScore} (${percentage}%)\n` +
                            `⏱️ Temps : ${minutes} min ${seconds} sec\n` +
                            `🎯 Niveau : ${levelName}\n` +
                            `${emoji} ${messageText}\n\n` +
                            `🔥 Voici mon score, essayez de faire mieux en téléchargeant l'application ETEO !\n` +
                            `📲 #ETEO #EndoToEveryOne #Endodontie #QuizDentaire`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'ETEO - Défi endodontie',
                    text: message,
                    url: window.location.href
                }).catch(() => {
                    copyToClipboard(message);
                });
            } else {
                copyToClipboard(message);
            }
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert("✅ Score copié ! Partagez-le avec vos collègues.");
        }
        
        // ============================================
        // FIREBASE SCORE SAVING
        // ============================================
        function saveScoreToFirebase(score, maxScore, timeSeconds, levelName) {
            let playerName = localStorage.getItem('playerName');
            if (!playerName) {
                playerName = prompt("🏆 FÉLICITATIONS !\n\nEntrez votre nom pour le classement mondial ETEO :", "Dr. Said");
                if (playerName && playerName.trim() !== "") {
                    localStorage.setItem('playerName', playerName);
                } else {
                    playerName = "Anonyme";
                }
            }
            
            if (db && playerName) {
                db.collection("scores").add({
                    name: playerName,
                    score: score,
                    maxScore: maxScore,
                    timeSeconds: timeSeconds,
                    level: levelName,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                })
                .then(() => {
                    console.log("✅ Score envoyé au classement mondial ETEO !");
                    alert(`✅ Merci ${playerName} ! Votre score (${score}/${maxScore}) a été enregistré dans le classement mondial ETEO !`);
                })
                .catch((error) => {
                    console.error("❌ Erreur d'envoi:", error);
                    alert("❌ Erreur lors de l'enregistrement. Vérifiez votre connexion internet.");
                });
            }
        }
        
        // ============================================
        // SHOW LEADERBOARD
        // ============================================
        function afficherClassement() {
            const oldClassement = document.getElementById('classement-mondial');
            if (oldClassement) {
                oldClassement.remove();
            }
            
            const classementDiv = document.createElement('div');
            classementDiv.id = 'classement-mondial';
            classementDiv.className = 'classement-container';
            
            const gameContentDiv = document.getElementById('gameContent');
            if (gameContentDiv) {
                gameContentDiv.appendChild(classementDiv);
            } else {
                alert("Impossible d'afficher le classement");
                return;
            }
            
            classementDiv.innerHTML = '<div class="classement-titre">🏆 CLASSEMENT MONDIAL ETEO 🏆</div><div style="text-align:center;">Chargement...</div>';
            
            db.collection("scores")
                .orderBy("score", "desc")
                .orderBy("timeSeconds", "asc")
                .limit(10)
                .get()
                .then((querySnapshot) => {
                    if (querySnapshot.empty) {
                        classementDiv.innerHTML = '<div class="classement-titre">🏆 CLASSEMENT MONDIAL ETEO 🏆</div><div style="text-align:center;">📊 Aucun score enregistré.<br>Soyez le premier !</div><div style="text-align: center; margin-top: 15px;"><button class="game-btn" onclick="fermerClassement()" style="padding: 8px 20px; font-size: 0.8rem; background: #ff9800;">❌ Fermer</button></div>';
                        return;
                    }
                    
                    let html = '<div class="classement-titre">🏆 CLASSEMENT MONDIAL ETEO 🏆</div>';
                    html += '<div style="font-size: 0.75rem; text-align: center; margin-bottom: 10px; color: #888;">Meilleurs scores - Tous niveaux</div>';
                    html += '<ol class="classement-liste" style="margin-left: 20px;">';
                    
                    let rank = 1;
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        const minutes = Math.floor(data.timeSeconds / 60);
                        const seconds = data.timeSeconds % 60;
                        let medalClass = '';
                        let medalSymbol = '';
                        if (rank === 1) { medalClass = 'medaille-or'; medalSymbol = '🥇 '; }
                        else if (rank === 2) { medalClass = 'medaille-argent'; medalSymbol = '🥈 '; }
                        else if (rank === 3) { medalClass = 'medaille-bronze'; medalSymbol = '🥉 '; }
                        
                        html += `<li class="${medalClass}" style="margin-bottom: 8px;">${medalSymbol}<strong>${data.name || 'Anonyme'}</strong> : ${data.score}/${data.maxScore} (${Math.round((data.score/data.maxScore)*100)}%) - ${minutes}:${seconds < 10 ? '0' : ''}${seconds} - ${data.level || '?'}</li>`;
                        rank++;
                    });
                    html += '</ol>';
                    html += '<div style="text-align: center; margin-top: 15px;"><button class="game-btn" onclick="afficherClassement()" style="padding: 8px 20px; font-size: 0.8rem;">🔄 Rafraîchir</button>';
                    html += '<button class="game-btn" onclick="fermerClassement()" style="padding: 8px 20px; font-size: 0.8rem; background: #ff9800;">❌ Fermer</button></div>';
                    
                    classementDiv.innerHTML = html;
                })
                .catch((error) => {
                    console.error("Erreur chargement classement:", error);
                    classementDiv.innerHTML = '<div class="classement-titre">🏆 CLASSEMENT MONDIAL ETEO 🏆</div><div style="text-align:center; color: red;">❌ Erreur de chargement<br>Vérifiez votre connexion internet</div><div style="text-align: center; margin-top: 15px;"><button class="game-btn" onclick="fermerClassement()" style="padding: 8px 20px; font-size: 0.8rem; background: #ff9800;">❌ Fermer</button></div>';
                });
        }
        
        function fermerClassement() {
            const classementDiv = document.getElementById('classement-mondial');
            if (classementDiv) {
                classementDiv.remove();
            }
        }
        
        // ============================================
        // QUIZ LOGIC
        // ============================================
        let reviewMode = false;
        let currentQuestion = 0;
        let score = 0;
        let shuffledQuestions = [];
        let quickAnswers = 0;
        let timerInterval = null;
        let inProgress = false;
        let startTime = null;
        let totalTime = 0;
        
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
        function resetQuiz() { stopTimer(); startQuiz(); }

        function nextQuestion() {
            if (inProgress) return;
            inProgress = true;
            stopTimer();
            currentQuestion++;
            if (currentQuestion < shuffledQuestions.length) {
                displayQuestion();
            } else {
                totalTime = Math.floor((Date.now() - startTime) / 1000);
                const percentage = (score / MAX_SCORE) * 100;
                if (percentage >= 90) speak("Félicitations Docteur, vous maîtrisez le diagnostic en endodontie !");
                else if (percentage >= 75) speak("Très bon travail Docteur !");
                else if (percentage >= 60) speak("Bien joué Docteur, vous pouvez passer au niveau intermédiaire !");
                else speak("Continuez vos révisions Docteur");
                
                localStorage.setItem(`eteo_score_${LEVEL_ID}`, score);
                
                if (score > 0) {
                    saveScoreToFirebase(score, MAX_SCORE, totalTime, LEVEL_NAME);
                }
                
                if (percentage >= 60) {
                    setTimeout(() => {
                        window.location.href = `menu_fr.html?unlocked=intermediaire1&score=${score}`;
                    }, 3000);
                } else {
                    showResult();
                }
            }
            inProgress = false;
        }

        function displayQuestion() {
            if (currentQuestion >= shuffledQuestions.length) { 
                nextQuestion();
                return; 
            }
            const q = shuffledQuestions[currentQuestion];
            const progress = ((currentQuestion + 1) / shuffledQuestions.length) * 100;
            let timeLeft = reviewMode ? 999 : 20;
            if (!reviewMode && voiceActive) speak(`Question ${currentQuestion + 1}: ${q.question}`);
            let html = `<div class="quiz-area"><div style="margin-bottom:15px;"><div style="display:flex;justify-content:space-between;margin-bottom:10px;"><span class="score">🏆 Score: ${score}</span>${!reviewMode ? `<span id="timer" style="background:#f0f0f0;padding:5px 15px;border-radius:20px;">⏱️ ${timeLeft}s</span>` : '<span style="background:#4caf50;padding:5px 15px;border-radius:20px;">📚 Mode Révision</span>'}<span>📋 ${currentQuestion + 1}/${shuffledQuestions.length}</span></div><div style="background:#e0e0e0;border-radius:10px;height:8px;"><div style="background:linear-gradient(135deg,#667eea,#764ba2);width:${progress}%;height:8px;border-radius:10px;"></div></div></div><div class="question">❓ ${q.question}</div><div class="options" id="options">`;
            q.options.forEach((opt, idx) => { const letter = String.fromCharCode(65 + idx); html += `<button class="option" data-index="${idx}">${letter}. ${opt}</button>`; });
            html += `</div><div id="feedback"></div><div class="quiz-actions"><button class="btn-menu" onclick="retourMenuAvecVoix()">🏠 Menu principal</button><button class="btn-reset" onclick="resetQuiz()">🔄 Recommencer</button></div></div>`;
            gameContent.innerHTML = html;
            let answered = false;
            function updateTimer() { const timerElement = document.getElementById('timer'); if (timerElement && !reviewMode) { timerElement.textContent = `⏱️ ${timeLeft}s`; if (timeLeft <= 5) timerElement.style.color = '#f44336'; else timerElement.style.color = '#333'; } }
            if (!reviewMode) {
                timerInterval = setInterval(() => {
                    if (!answered) {
                        timeLeft--;
                        updateTimer();
                        if (timeLeft <= 0) {
                            clearInterval(timerInterval); timerInterval = null;
                            if (!answered) {
                                answered = true;
                                speak(`Temps écoulé. La réponse était ${q.options[q.correct]}`);
                                const feedback = document.getElementById('feedback');
                                if (feedback) feedback.innerHTML = `<p style="color:red;margin-top:15px;">⏰ Temps écoulé !<br>📖 ${q.explanation}</p>`;
                                const options = document.querySelectorAll('.option');
                                options.forEach(btn => { btn.style.pointerEvents = 'none'; const idx = parseInt(btn.dataset.index); if (idx === q.correct) btn.classList.add('correct'); });
                                addNextButton();
                            }
                        }
                    }
                }, 1000);
                updateTimer();
            }
            const options = document.querySelectorAll('.option');
            options.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (answered) return;
                    const idx = parseInt(btn.dataset.index);
                    let timeUsed = !reviewMode ? (20 - timeLeft) : 0;
                    let speedBonus = 0;
                    if (!reviewMode && timeUsed <= 5 && timeUsed >= 0) { speedBonus = 5; quickAnswers++; }
                    answered = true;
                    clearInterval(timerInterval); timerInterval = null;
                    if (idx === q.correct) {
                        score += 10 + speedBonus;
                        btn.classList.add('correct');
                        let message = `✅ Correct ! +10 points`;
                        if (speedBonus > 0) message += ` +${speedBonus} (rapide !)`;
                        if (reviewMode) message += `<br>📖 ${q.explanation}`;
                        const feedback = document.getElementById('feedback');
                        if (feedback) feedback.innerHTML = `<p style="color:green;margin-top:15px;">${message}</p>`;
                        speak(`Bonne réponse. ${q.explanation.substring(0, 80)}`);
                    } else {
                        btn.classList.add('wrong');
                        const feedback = document.getElementById('feedback');
                        if (feedback) feedback.innerHTML = `<p style="color:red;margin-top:15px;">❌ Faux ! Réponse: ${q.options[q.correct]}<br>📖 ${q.explanation}</p>`;
                        options.forEach(b => { if (parseInt(b.dataset.index) === q.correct) b.classList.add('correct'); });
                        speak(`Dommage. La bonne réponse était ${q.options[q.correct]}. ${q.explanation.substring(0, 80)}`);
                    }
                    options.forEach(opt => opt.style.pointerEvents = 'none');
                    addNextButton();
                });
            });
        }

        function addNextButton() {
            const optionsDiv = document.getElementById('options');
            if (optionsDiv && !document.getElementById('nextBtnTemp')) {
                const nextBtn = document.createElement('button');
                nextBtn.id = 'nextBtnTemp';
                nextBtn.className = 'next-btn';
                nextBtn.textContent = '➡️ Question suivante';
                nextBtn.onclick = () => nextQuestion();
                optionsDiv.parentElement.insertBefore(nextBtn, optionsDiv.parentElement.querySelector('.quiz-actions'));
            }
        }

        function showResult() {
            stopTimer();
            const maxScore = MAX_SCORE;
            const percentage = Math.round((score / maxScore) * 100);
            let message = "", emoji = "";
            if (percentage >= 90) { message = "Excellent ! Diagnostic maîtrisé !"; emoji = "🏆👑"; }
            else if (percentage >= 75) { message = "Très bien ! Niveau intermédiaire vous attend"; emoji = "🦷⭐"; }
            else if (percentage >= 60) { message = "Bien ! Vous pouvez passer au niveau intermédiaire"; emoji = "👍📚"; }
            else { message = "Revoyez les bases du diagnostic"; emoji = "📖🤔"; }
            
            gameContent.innerHTML = `<div class="result">
                <h2>🎉 Quiz ETEO Terminé ! ${emoji}</h2>
                <div class="final-score">${score}/${maxScore}</div>
                <p style="margin:20px;">${message}</p>
                <p>📚 ${shuffledQuestions.length} questions - Débutant Niveau 2</p>
                ${quickAnswers > 0 ? `<p>⚡ ${quickAnswers} réponses rapides (+5 pts chacune)</p>` : ''}
                <div class="flex-buttons">
                    <button class="game-btn" onclick="startQuiz()">🔄 Rejouer</button>
                    <button class="game-btn" onclick="retourMenuAvecVoix()">🏠 Menu</button>
                    <button class="game-btn" onclick="shareResult(${score}, ${MAX_SCORE}, '${LEVEL_NAME}', ${totalTime})">📤 Partager mon score</button>
                </div>
            </div>`;
            
            setTimeout(() => {
                afficherClassement();
            }, 500);
        }

        function startQuiz() {
            startTime = Date.now();
            stopTimer();
            shuffledQuestions = shuffleArray([...questions]);
            currentQuestion = 0;
            score = 0;
            quickAnswers = 0;
            displayQuestion();
        }
        
        function showWelcomeMenu() {
            const savedScore = localStorage.getItem(`eteo_score_${LEVEL_ID}`);
            const scoreText = savedScore ? `Score: ${savedScore}/${MAX_SCORE} (${Math.round((savedScore/MAX_SCORE)*100)}%)` : "Non commencé";
            
            gameContent.innerHTML = `<div class="quiz-area">
                <h2>🦷 Bienvenue Docteur dans ETEO !</h2>
                <p style="margin: 20px 0;">Endo To Every One - Niveau Débutant 2 : Diagnostic initial</p>
                <p>📚 25 questions | Tests, symptômes, diagnostic différentiel</p>
                <p>⏱️ 20 secondes par question | ⚡ Bonus rapidité +5</p>
                <p style="margin: 10px 0; color: #4caf50;">📊 ${scoreText}</p>
                <div class="flex-buttons">
                    <button class="game-btn" onclick="demarrerQuizAvecVoix()">🎯 Commencer le quiz</button>
                    <button class="game-btn" onclick="retourMenuAvecVoix()">🏠 Menu principal</button>
                    <button class="game-btn" onclick="afficherClassementAvecVoix()">🏆 Voir le classement</button>
                    <button class="game-btn game-btn-feedback" onclick="demanderAvisAvecVoix()">📝 Donner mon avis</button>
                </div>
                <div style="margin-top: 20px; padding-top: 10px; border-top: 1px solid #eee;">
                    <p style="font-size: 0.7rem; color: #888;">
                        ⚠️ À usage éducatif uniquement. En cas de doute, consultez la littérature scientifique récente.
                    </p>
                </div>
            </div>`;
        }

        showWelcomeMenu();
    </script>
</body>
</html>
