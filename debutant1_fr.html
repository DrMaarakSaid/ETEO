    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        body.dark { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); }
        .game-container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        body.dark .game-container { background: #1e1e2e; color: #eee; }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 25px 20px;
            text-align: center;
        }
        .header h1 { font-size: 1.8rem; }
        .header p { opacity: 0.9; font-size: 0.85rem; }
        .quiz-area, .result { padding: 30px 20px; text-align: center; }
        .game-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 50px;
            margin: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .game-btn:active { transform: scale(0.97); }
        .game-btn-feedback {
            background: linear-gradient(135deg, #ff9800, #f44336);
        }
        .question { font-size: 1.2rem; font-weight: bold; margin-bottom: 20px; text-align: center; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option {
            background: #f0f2f5;
            border: 2px solid #ddd;
            padding: 12px;
            border-radius: 15px;
            cursor: pointer;
            text-align: left;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        body.dark .option { background: #2a2a3e; border-color: #444; }
        .option.correct { background: #4caf50; color: white; }
        .option.wrong { background: #f44336; color: white; }
        .score { text-align: center; margin-bottom: 20px; font-weight: bold; }
        .final-score { font-size: 2.5rem; font-weight: bold; color: #667eea; margin: 20px 0; }
        .next-btn {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .flex-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .quiz-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
        .quiz-actions button { background: #666; color: white; border: none; padding: 8px 18px; border-radius: 25px; cursor: pointer; }
        .btn-menu { background: #ff9800 !important; }
        .btn-reset { background: #2196f3 !important; }
        .voice-indicator {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4caf50;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 10px;
            z-index: 999;
        }
        .classement-container {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 15px;
            text-align: left;
        }
        body.dark .classement-container { background: #2a2a3e; }
        .classement-titre { font-weight: bold; margin-bottom: 10px; text-align: center; color: #ff9800; }
        .classement-liste { margin-left: 20px; }
        .classement-liste li { margin-bottom: 8px; }
        .medaille-or { color: #ffd700; }
        .medaille-argent { color: #c0c0c0; }
        .medaille-bronze { color: #cd7f32; }
    </style>
</head>
<body>
    <div class="voice-indicator" id="voiceIndicator">🎙️ IA en attente</div>
    <div class="game-container" id="gameContainer">
        <div class="header">
            <h1>🦷 ETEO</h1>
            <p>Endo To Every One - Débutant Niveau 1 : Bases fondamentales</p>
        </div>
        <div id="gameContent"></div>
    </div>

    <script>
        // ============================================
        // 25 QUESTIONS - DÉBUTANT NIVEAU 1
        // ============================================
        const questions = [
            { question: "Combien de racines a une molaire maxillaire typique ?", options: ["1", "2", "3", "4"], correct: 2, explanation: "Une molaire maxillaire typique possède 3 racines." },
            { question: "Quelle est la forme recommandée pour la cavité d'accès d'une incisive centrale maxillaire ?", options: ["Circulaire", "Triangulaire", "Ovale", "Carrée"], correct: 1, explanation: "La cavité d'accès est triangulaire." },
            { question: "Quel pourcentage d'incisives latérales mandibulaires présentent 2 canaux ?", options: ["25%", "35%", "44%", "55%"], correct: 2, explanation: "Environ 44% des incisives latérales mandibulaires ont deux canaux." },
            { question: "La pente d'un instrument endodontique ISO 0.02 signifie :", options: ["Augmentation de 0.2 mm par mm", "Augmentation de 0.02 mm par mm", "Augmentation de 0.02 mm par 2 mm", "Diminution"], correct: 1, explanation: "Une pente 0.02 = augmentation de 0.02 mm par mm." },
            { question: "Le plexus nerveux de Raschkow est situé dans quelle couche de la pulpe ?", options: ["Couche odontoblastique", "Couche acellulaire", "Couche cellulaire riche", "Noyau central"], correct: 1, explanation: "Le plexus de Raschkow se trouve dans la couche acellulaire." },
            { question: "Le symptôme le plus précoce d'une pulpe enflammée est :", options: ["Sensibilité thermique", "Douleur spontanée nocturne", "Douleur à la percussion", "Douleur à la palpation"], correct: 0, explanation: "La sensibilité au chaud/froid est le premier signe." },
            { question: "Une réponse thermique normale se caractérise par :", options: ["Douleur qui disparaît en 1-2 secondes", "Douleur qui persiste 15 secondes", "Absence de réponse", "Douleur pulsatile"], correct: 0, explanation: "Une pulpe saine répond par une douleur brève." },
            { question: "Une réponse thermique avec douleur persistante >15 secondes indique :", options: ["Pulpite réversible", "Pulpite irréversible", "Pulpe normale", "Hyperémie"], correct: 1, explanation: "Une douleur persistante signe une pulpite irréversible." },
            { question: "Le test de percussion renseigne sur :", options: ["La santé de la pulpe", "L'inflammation du desmodonte", "La profondeur de la carie", "Une fracture"], correct: 1, explanation: "La percussion évalue le ligament parodontal." },
            { question: "La pulpe dentaire est unique car :", options: ["Circulation collatérale abondante", "Entourée de tissu dur", "Pas de cellules sensorielles", "Se régénère complètement"], correct: 1, explanation: "La pulpe est enfermée dans des tissus durs." },
            { question: "Le produit actif dans l'Endo Ice est :", options: ["Azote liquide", "Dichlorodifluorométhane", "Oxyde nitreux", "Eau glacée"], correct: 1, explanation: "L'Endo Ice utilise du dichlorodifluorométhane." },
            { question: "Le pourcentage d'incisives centrales mandibulaires avec 2 canaux et 2 foramens est :", options: ["24%", "6%", "30%", "44%"], correct: 1, explanation: "Seulement 6% ont deux canaux distincts." },
            { question: "La deuxième prémolaire mandibulaire a le plus souvent :", options: ["1 canal, 1 foramen (86%)", "2 canaux, 2 foramens", "1 canal, 2 foramens", "2 canaux, 1 foramen"], correct: 0, explanation: "86% ont un canal unique." },
            { question: "Le concept de 'Patency' consiste à :", options: ["Élargir le foramen à #40", "Utiliser une petite lime pour confirmer la perméabilité", "Obturer le canal", "Isoler avec digue"], correct: 1, explanation: "La patency maintient le foramen perméable." },
            { question: "La longueur de travail se mesure idéalement à :", options: ["0.5-1.0 mm court de l'apex", "Exactement à l'apex", "1.0 mm au-delà", "2.0 mm court"], correct: 0, explanation: "La WL se situe 0.5-1 mm court de l'apex." },
            { question: "La gutta-percha contient principalement :", options: ["Latex", "Gutta-percha + oxyde de zinc", "Résine époxy", "Silicone"], correct: 1, explanation: "La gutta-percha est composée de trans-1,4-polyisoprène." },
            { question: "Une hyperhémie pulpaire est :", options: ["Réversible", "Nécrose totale", "Abcès apical", "Chronicité"], correct: 0, explanation: "L'hyperhémie est une inflammation réversible." },
            { question: "Un critère essentiel pour une pulpe saine est :", options: ["Réponse normale aux tests", "Absence de réponse", "Réponse uniquement au chaud", "Douleur à la percussion"], correct: 0, explanation: "Une pulpe saine répond normalement aux tests." },
            { question: "La zone de contrôle apical est :", options: ["Zone créée par l'endodontiste dans le tiers apical", "Zone naturelle coronaire", "Chambre pulpaire", "Collet"], correct: 0, explanation: "Zone intentionnellement façonnée par le clinicien." },
            { question: "L'ostéite condensante est :", options: ["Lésion radio-opaque réactionnelle", "Lésion radio-claire", "Kyste", "Tumeur"], correct: 0, explanation: "Réaction osseuse sclérotique à une inflammation." },
            { question: "Une cicatrice apicale se présente comme :", options: ["Radiolucence apicale sur dent bien traitée", "Radio-opacité", "Kyste", "Nécrose"], correct: 0, explanation: "Zone radiolucente persistante sur dent correctement traitée." },
            { question: "Un kyste latéro-radiculaire est d'origine :", options: ["Développementale", "Infectieuse", "Traumatique", "Inflammatoire"], correct: 0, explanation: "Lésion développementale, non inflammatoire." },
            { question: "Dans un kyste latéro-radiculaire, la dent est :", options: ["Vitale", "Non vitale", "Nécrosée", "Déchaussée"], correct: 0, explanation: "Associée à une dent vitale." },
            { question: "Le cémentome périapical :", options: ["N'affecte pas la vitalité pulpaire", "Nécessite toujours un traitement", "Est malin", "Est symptomatique"], correct: 0, explanation: "Lésion bénigne non associée à la nécrose." },
            { question: "La technique 'step-back' est :", options: ["Technique apico-coronaire", "Technique d'obturation", "Technique d'anesthésie", "Technique radiographique"], correct: 0, explanation: "Instrumentation de l'apex vers la couronne." }
        ];

        const LEVEL_ID = 'debutant1';
        const LEVEL_NAME = 'Débutant Niveau 1';
        const MAX_SCORE = questions.length * 10;
        
        // ============================================
        // VOICE SYSTEM
        // ============================================
        let speechSynthesisObj = null;
        let voiceActive = true;
        let voiceReady = false;
        
        function initVoice() {
            if ('speechSynthesis' in window) {
                speechSynthesisObj = window.speechSynthesis;
                voiceReady = true;
                return true;
            }
            return false;
        }
        
        function speak(text) {
            if (!voiceActive || !speechSynthesisObj || !voiceReady) return;
            try {
                speechSynthesisObj.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'fr-FR';
                utterance.rate = 0.9;
                utterance.pitch = 1.0;
                speechSynthesisObj.speak(utterance);
            } catch(e) {}
        }
        
        // Initialiser la voix (sans parler automatiquement)
        initVoice();
        
        // ============================================
        // MESSAGES VOCAUX SPÉCIFIQUES PAR BOUTON
        // ============================================
        
        function demarrerQuizAvecVoix() {
            speak("Bienvenue Docteur dans ETEO, Endo To Every One. Niveau Débutant 1, bases fondamentales. C'est parti !");
            setTimeout(() => {
                startQuiz();
            }, 10000);
        }
        
        function afficherClassementAvecVoix() {
            speak("Voici le classement mondial ETEO. Découvrez les meilleurs scores.");
            setTimeout(() => {
                afficherClassement();
            }, 4000);
        }
        
        function demanderAvisAvecVoix() {
            const googleFormLink = "https://docs.google.com/forms/d/e/1FAIpQLSca6J-wmsp7Ci9-Y_LEyhyvj4BrazhHZpLhmB3YcDgckzya6Q/viewform";
            window.open(googleFormLink, '_blank');
            speak("Merci Docteur, votre avis nous est précieux. Cela nous aidera à améliorer ETEO.");
        }
        
        function retourMenuAvecVoix() {
            speak("Retour au menu principal.");
            setTimeout(() => {
                window.location.href = "menu_fr.html";
            }, 3000);
        }
        
        // ============================================
        // FONCTION DE PARTAGE
        // ============================================
        function shareResult(score, maxScore, levelName, timeSeconds) {
            const percentage = Math.round((score / maxScore) * 100);
            const minutes = Math.floor(timeSeconds / 60);
            const seconds = timeSeconds % 60;
            
            let emoji = "";
            let messageText = "";
            if (percentage >= 90) { emoji = "🏆👑"; messageText = "Maîtrise parfaite !"; }
            else if (percentage >= 75) { emoji = "🦷⭐"; messageText = "Très bonne maîtrise !"; }
            else if (percentage >= 60) { emoji = "👍📚"; messageText = "Bon niveau !"; }
            else if (percentage >= 50) { emoji = "📖🤔"; messageText = "En progrès !"; }
            else { emoji = "💪😊"; messageText = "Je m'améliore !"; }
            
            const message = `🦷 ETEO - Endo To Every One\n\n` +
                            `📊 Mon score : ${score}/${maxScore} (${percentage}%)\n` +
                            `⏱️ Temps : ${minutes} min ${seconds} sec\n` +
                            `🎯 Niveau : ${levelName}\n` +
                            `${emoji} ${messageText}\n\n` +
                            `🔥 Voici mon score, essayez de faire mieux en téléchargeant l'application ETEO !\n` +
                            `📲 #ETEO #EndoToEveryOne #Endodontie #QuizDentaire`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'ETEO - Défi endodontie',
                    text: message,
                    url: window.location.href
                }).catch(() => {
                    copyToClipboard(message);
                });
            } else {
                copyToClipboard(message);
            }
        }
        
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text);
            alert("✅ Score copié ! Partagez-le avec vos collègues.");
        }
        
        // ============================================
        // FONCTION POUR SAUVEGARDER LE SCORE DANS FIREBASE
        // ============================================
        function saveScoreToFirebase(score, maxScore, timeSeconds, levelName) {
            let playerName = localStorage.getItem('playerName');
            if (!playerName) {
                playerName = prompt("🏆 FÉLICITATIONS !\n\nEntrez votre nom pour le classement mondial ETEO :", "Dr. Said");
                if (playerName && playerName.trim() !== "") {
                    localStorage.setItem('playerName', playerName);
                } else {
                    playerName = "Anonyme";
                }
            }
            
            if (db && playerName) {
                db.collection("scores").add({
                    name: playerName,
                    score: score,
                    maxScore: maxScore,
                    timeSeconds: timeSeconds,
                    level: levelName,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                })
                .then(() => {
                    console.log("✅ Score envoyé au classement mondial ETEO !");
                    alert(`✅ Merci ${playerName} ! Votre score (${score}/${maxScore}) a été enregistré dans le classement mondial ETEO !`);
                })
                .catch((error) => {
                    console.error("❌ Erreur d'envoi:", error);
                    alert("❌ Erreur lors de l'enregistrement. Vérifiez votre connexion internet.");
                });
            }
        }
        
        // ============================================
        // AFFICHER LE CLASSEMENT MONDIAL
        // ============================================
        function afficherClassement() {
            const oldClassement = document.getElementById('classement-mondial');
            if (oldClassement) {
                oldClassement.remove();
            }
            
            const classementDiv = document.createElement('div');
            classementDiv.id = 'classement-mondial';
            classementDiv.className = 'classement-container';
            
            const gameContentDiv = document.getElementById('gameContent');
            if (gameContentDiv) {
                gameContentDiv.appendChild(classementDiv);
            } else {
                alert("Impossible d'afficher le classement");
                return;
            }
            
            classementDiv.innerHTML = '<div class="classement-titre">🏆 CLASSEMENT MONDIAL ETEO 🏆</div><div style="text-align:center;">Chargement...</div>';
            
            db.collection("scores")
                .orderBy("score", "desc")
                .orderBy("timeSeconds", "asc")
                .limit(10)
                .get()
                .then((querySnapshot) => {
                    if (querySnapshot.empty) {
                        classementDiv.innerHTML = '<div class="classement-titre">🏆 CLASSEMENT MONDIAL ETEO 🏆</div><div style="text-align:center;">📊 Aucun score enregistré.<br>Soyez le premier !</div><div style="text-align: center; margin-top: 15px;"><button class="game-btn" onclick="fermerClassement()" style="padding: 8px 20px; font-size: 0.8rem; background: #ff9800;">❌ Fermer</button></div>';
                        return;
                    }
                    
                    let html = '<div class="classement-titre">🏆 CLASSEMENT MONDIAL ETEO 🏆</div>';
                    html += '<div style="font-size: 0.75rem; text-align: center; margin-bottom: 10px; color: #888;">Meilleurs scores - Tous niveaux</div>';
                    html += '<ol class="classement-liste" style="margin-left: 20px;">';
                    
                    let rank = 1;
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        const minutes = Math.floor(data.timeSeconds / 60);
                        const seconds = data.timeSeconds % 60;
                        let medalClass = '';
                        let medalSymbol = '';
                        if (rank === 1) { medalClass = 'medaille-or'; medalSymbol = '🥇 '; }
                        else if (rank === 2) { medalClass = 'medaille-argent'; medalSymbol = '🥈 '; }
                        else if (rank === 3) { medalClass = 'medaille-bronze'; medalSymbol = '🥉 '; }
                        
                        html += `<li class="${medalClass}" style="margin-bottom: 8px;">${medalSymbol}<strong>${data.name || 'Anonyme'}</strong> : ${data.score}/${data.maxScore} (${Math.round((data.score/data.maxScore)*100)}%) - ${minutes}:${seconds < 10 ? '0' : ''}${seconds} - ${data.level || '?'}</li>`;
                        rank++;
                    });
                    html += '</ol>';
                    html += '<div style="text-align: center; margin-top: 15px;"><button class="game-btn" onclick="afficherClassement()" style="padding: 8px 20px; font-size: 0.8rem;">🔄 Rafraîchir</button>';
                    html += '<button class="game-btn" onclick="fermerClassement()" style="padding: 8px 20px; font-size: 0.8rem; background: #ff9800;">❌ Fermer</button></div>';
                    
                    classementDiv.innerHTML = html;
                })
                .catch((error) => {
                    console.error("Erreur chargement classement:", error);
                    classementDiv.innerHTML = '<div class="classement-titre">🏆 CLASSEMENT MONDIAL ETEO 🏆</div><div style="text-align:center; color: red;">❌ Erreur de chargement<br>Vérifiez votre connexion internet</div><div style="text-align: center; margin-top: 15px;"><button class="game-btn" onclick="fermerClassement()" style="padding: 8px 20px; font-size: 0.8rem; background: #ff9800;">❌ Fermer</button></div>';
                });
        }
        
        function fermerClassement() {
            const classementDiv = document.getElementById('classement-mondial');
            if (classementDiv) {
                classementDiv.remove();
            }
        }
        
        let reviewMode = false;
        let currentQuestion = 0;
        let score = 0;
        let shuffledQuestions = [];
        let quickAnswers = 0;
        let timerInterval = null;
        let inProgress = false;
        let startTime = null;
        let totalTime = 0;
        
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
        function resetQuiz() { stopTimer(); startQuiz(); }

        function nextQuestion() {
            if (inProgress) return;
            inProgress = true;
            stopTimer();
            currentQuestion++;
            if (currentQuestion < shuffledQuestions.length) {
                displayQuestion();
            } else {
                totalTime = Math.floor((Date.now() - startTime) / 1000);
                const percentage = (score / MAX_SCORE) * 100;
                if (percentage >= 90) speak("Félicitations Docteur, vous maîtrisez les bases de l'endodontie !");
                else if (percentage >= 75) speak("Très bon travail Docteur !");
                else if (percentage >= 60) speak("Bien joué Docteur, vous pouvez passer au niveau 2");
                else speak("Continuez vos révisions Docteur");
                
                localStorage.setItem(`eteo_score_${LEVEL_ID}`, score);
                
                if (score > 0) {
                    saveScoreToFirebase(score, MAX_SCORE, totalTime, LEVEL_NAME);
                }
                
                if (percentage >= 60) {
                    setTimeout(() => {
                        window.location.href = `menu_fr.html?unlocked=debutant2&score=${score}`;
                    }, 3000);
                } else {
                    showResult();
                }
            }
            inProgress = false;
        }

        function displayQuestion() {
            if (currentQuestion >= shuffledQuestions.length) { 
                nextQuestion();
                return; 
            }
            const q = shuffledQuestions[currentQuestion];
            const progress = ((currentQuestion + 1) / shuffledQuestions.length) * 100;
            let timeLeft = reviewMode ? 999 : 20;
            if (!reviewMode && voiceActive) speak(`Question ${currentQuestion + 1}: ${q.question}`);
            let html = `<div class="quiz-area"><div style="margin-bottom:15px;"><div style="display:flex;justify-content:space-between;margin-bottom:10px;"><span class="score">🏆 Score: ${score}</span>${!reviewMode ? `<span id="timer" style="background:#f0f0f0;padding:5px 15px;border-radius:20px;">⏱️ ${timeLeft}s</span>` : '<span style="background:#4caf50;padding:5px 15px;border-radius:20px;">📚 Mode Révision</span>'}<span>📋 ${currentQuestion + 1}/${shuffledQuestions.length}</span></div><div style="background:#e0e0e0;border-radius:10px;height:8px;"><div style="background:linear-gradient(135deg,#667eea,#764ba2);width:${progress}%;height:8px;border-radius:10px;"></div></div></div><div class="question">❓ ${q.question}</div><div class="options" id="options">`;
            q.options.forEach((opt, idx) => { const letter = String.fromCharCode(65 + idx); html += `<button class="option" data-index="${idx}">${letter}. ${opt}</button>`; });
            html += `</div><div id="feedback"></div><div class="quiz-actions"><button class="btn-menu" onclick="retourMenuAvecVoix()">🏠 Menu principal</button><button class="btn-reset" onclick="resetQuiz()">🔄 Recommencer</button></div></div>`;
            gameContent.innerHTML = html;
            let answered = false;
            function updateTimer() { const timerElement = document.getElementById('timer'); if (timerElement && !reviewMode) { timerElement.textContent = `⏱️ ${timeLeft}s`; if (timeLeft <= 5) timerElement.style.color = '#f44336'; else timerElement.style.color = '#333'; } }
            if (!reviewMode) {
                timerInterval = setInterval(() => {
                    if (!answered) {
                        timeLeft--;
                        updateTimer();
                        if (timeLeft <= 0) {
                            clearInterval(timerInterval); timerInterval = null;
                            if (!answered) {
                                answered = true;
                                speak(`Temps écoulé. La réponse était ${q.options[q.correct]}`);
                                const feedback = document.getElementById('feedback');
                                if (feedback) feedback.innerHTML = `<p style="color:red;margin-top:15px;">⏰ Temps écoulé !<br>📖 ${q.explanation}</p>`;
                                const options = document.querySelectorAll('.option');
                                options.forEach(btn => { btn.style.pointerEvents = 'none'; const idx = parseInt(btn.dataset.index); if (idx === q.correct) btn.classList.add('correct'); });
                                addNextButton();
                            }
                        }
                    }
                }, 1000);
                updateTimer();
            }
            const options = document.querySelectorAll('.option');
            options.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (answered) return;
                    const idx = parseInt(btn.dataset.index);
                    let timeUsed = !reviewMode ? (20 - timeLeft) : 0;
                    let speedBonus = 0;
                    if (!reviewMode && timeUsed <= 5 && timeUsed >= 0) { speedBonus = 5; quickAnswers++; }
                    answered = true;
                    clearInterval(timerInterval); timerInterval = null;
                    if (idx === q.correct) {
                        score += 10 + speedBonus;
                        btn.classList.add('correct');
                        let message = `✅ Correct ! +10 points`;
                        if (speedBonus > 0) message += ` +${speedBonus} (rapide !)`;
                        if (reviewMode) message += `<br>📖 ${q.explanation}`;
                        const feedback = document.getElementById('feedback');
                        if (feedback) feedback.innerHTML = `<p style="color:green;margin-top:15px;">${message}</p>`;
                        speak(`Bonne réponse. ${q.explanation.substring(0, 80)}`);
                    } else {
                        btn.classList.add('wrong');
                        const feedback = document.getElementById('feedback');
                        if (feedback) feedback.innerHTML = `<p style="color:red;margin-top:15px;">❌ Faux ! Réponse: ${q.options[q.correct]}<br>📖 ${q.explanation}</p>`;
                        options.forEach(b => { if (parseInt(b.dataset.index) === q.correct) b.classList.add('correct'); });
                        speak(`Dommage. La bonne réponse était ${q.options[q.correct]}. ${q.explanation.substring(0, 80)}`);
                    }
                    options.forEach(opt => opt.style.pointerEvents = 'none');
                    addNextButton();
                });
            });
        }

        function addNextButton() {
            const optionsDiv = document.getElementById('options');
            if (optionsDiv && !document.getElementById('nextBtnTemp')) {
                const nextBtn = document.createElement('button');
                nextBtn.id = 'nextBtnTemp';
                nextBtn.className = 'next-btn';
                nextBtn.textContent = '➡️ Question suivante';
                nextBtn.onclick = () => nextQuestion();
                optionsDiv.parentElement.insertBefore(nextBtn, optionsDiv.parentElement.querySelector('.quiz-actions'));
            }
        }

        function showResult() {
            stopTimer();
            const maxScore = MAX_SCORE;
            const percentage = Math.round((score / maxScore) * 100);
            let message = "", emoji = "";
            if (percentage >= 90) { message = "Excellent ! Vous maîtrisez les bases !"; emoji = "🏆👑"; }
            else if (percentage >= 75) { message = "Très bien ! Niveau 2 vous attend"; emoji = "🦷⭐"; }
            else if (percentage >= 60) { message = "Bien ! Vous pouvez passer au niveau 2"; emoji = "👍📚"; }
            else { message = "Revoyez les bases avant de passer au niveau 2"; emoji = "📖🤔"; }
            
            gameContent.innerHTML = `<div class="result">
                <h2>🎉 Quiz ETEO Terminé ! ${emoji}</h2>
                <div class="final-score">${score}/${maxScore}</div>
                <p style="margin:20px;">${message}</p>
                <p>📚 ${shuffledQuestions.length} questions - Débutant Niveau 1</p>
                ${quickAnswers > 0 ? `<p>⚡ ${quickAnswers} réponses rapides (+5 pts chacune)</p>` : ''}
                <div class="flex-buttons">
                    <button class="game-btn" onclick="startQuiz()">🔄 Rejouer</button>
                    <button class="game-btn" onclick="retourMenuAvecVoix()">🏠 Menu</button>
                    <button class="game-btn" onclick="shareResult(${score}, ${MAX_SCORE}, '${LEVEL_NAME}', ${totalTime})">📤 Partager mon score</button>
                </div>
            </div>`;
            
            setTimeout(() => {
                afficherClassement();
            }, 500);
        }

        function startQuiz() {
            startTime = Date.now();
            stopTimer();
            shuffledQuestions = shuffleArray([...questions]);
            currentQuestion = 0;
            score = 0;
            quickAnswers = 0;
            displayQuestion();
        }
        
        function showWelcomeMenu() {
            const savedScore = localStorage.getItem(`eteo_score_${LEVEL_ID}`);
            const scoreText = savedScore ? `Score: ${savedScore}/${MAX_SCORE} (${Math.round((savedScore/MAX_SCORE)*100)}%)` : "Non commencé";
            
            gameContent.innerHTML = `<div class="quiz-area">
                <h2>🦷 Bienvenue Docteur dans ETEO !</h2>
                <p style="margin: 20px 0;">Endo To Every One - Niveau Débutant 1 : Bases fondamentales</p>
                <p>📚 25 questions | Anatomie, terminologie</p>
                <p>⏱️ 20 secondes par question | ⚡ Bonus rapidité +5</p>
                <p style="margin: 10px 0; color: #4caf50;">📊 ${scoreText}</p>
                <div class="flex-buttons">
                    <button class="game-btn" onclick="demarrerQuizAvecVoix()">🎯 Commencer le quiz</button>
                    <button class="game-btn" onclick="retourMenuAvecVoix()">🏠 Menu principal</button>
                    <button class="game-btn" onclick="afficherClassementAvecVoix()">🏆 Voir le classement</button>
                    <button class="game-btn game-btn-feedback" onclick="demanderAvisAvecVoix()">📝 Donner mon avis</button>
                </div>
                <div style="margin-top: 20px; padding-top: 10px; border-top: 1px solid #eee;">
                    <p style="font-size: 0.7rem; color: #888;">
                        ⚠️ À usage éducatif uniquement. En cas de doute, consultez la littérature scientifique récente.
                    </p>
                </div>
            </div>`;
        }

        showWelcomeMenu();
    </script>
</body>
</html>
